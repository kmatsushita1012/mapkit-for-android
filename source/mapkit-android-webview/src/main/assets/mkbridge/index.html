<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.css" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #ffffff; overflow: hidden; }
      #mapRoot { position: fixed; inset: 0; width: 100%; height: 100%; }
      #mapCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #statusWrap { display: none; }
    </style>
  </head>
  <body>
    <div id="mapRoot">
      <div id="mapCanvas"></div>
    </div>
    <div id="statusWrap">
      <div id="status">loading...</div>
    </div>
    <script src="./bridge.js"></script>
  </body>
</html>
